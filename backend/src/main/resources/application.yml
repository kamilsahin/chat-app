spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/chatdb}

server:
  port: 8080

chat:
  auth:
    jwt-secret: ${JWT_SECRET:change-me-in-production}
    jwt-issuer: ${JWT_ISSUER:}

  internal:
    api-secret: ${INTERNAL_API_SECRET:change-me-in-production}

  storage:
    upload-dir: ${CHAT_UPLOAD_DIR:/uploads}

  notifications:
    enabled: ${NOTIFICATIONS_ENABLED:false}
    fcm:
      credentials-file: ${FCM_CREDENTIALS_FILE:}

  features:
    file-sharing-enabled: ${FEATURE_FILE_SHARING:true}
    reactions-enabled: ${FEATURE_REACTIONS:true}
    max-message-length: ${FEATURE_MAX_MSG_LENGTH:2000}
    max-group-size: ${FEATURE_MAX_GROUP_SIZE:500}
    message-retention-days: ${FEATURE_RETENTION_DAYS:0}
    delete-permission: ${FEATURE_DELETE_PERMISSION:OWN_ONLY}
    keyword-blocklist: ${FEATURE_KEYWORD_BLOCKLIST:}
